server:
  port: 8080

spring:
  application:
    name: cert-monitor

  datasource:
    url: jdbc:mysql://localhost:3306/cert_monitor?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 5000ms

  mail:
    host: smtp.qq.com
    port: 587
    username: your_email@qq.com
    password: your_auth_code
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# 自定义配置
cert-monitor:
  scan:
    timeout: 5000
    retry-count: 2
  alert:
    enabled: true
    cooldown-minutes: 60
